services:
  mongodb:
    image: mongo:7
    container_name: meesho-pragati-mongodb
    ports:
      - "27017:27017"
    volumes:
      - pragati_mongo_data:/data/db
    networks:
      - pragati-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml-model:
    build:
      context: ../ml-model
      dockerfile: Dockerfile
    container_name: meesho-pragati-ml-model
    ports:
      - "5001:5001"
    networks:
      - pragati-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meesho-pragati-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/pragati_agent
      - ML_SERVICE_URL=http://ml-model:5001
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-8b-instant}
      - GROQ_API_BASE_URL=${GROQ_API_BASE_URL:-https://api.groq.com/openai/v1}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    depends_on:
      mongodb:
        condition: service_healthy
      ml-model:
        condition: service_healthy
    networks:
      - pragati-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  pragati-network:
    driver: bridge

volumes:
  pragati_mongo_data:
